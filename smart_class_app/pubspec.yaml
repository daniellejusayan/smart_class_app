name: smart_class_app
description: Smart Class Check-in & Learning Reflection App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # QR Code
  mobile_scanner: ^5.1.1
  qr_flutter: ^4.1.0

  # Location
  geolocator: ^12.0.0

  # Local Database
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # Shared Preferences (for student ID)
  shared_preferences: ^2.3.1

  # Firebase
  firebase_core: ^3.6.0
  firebase_analytics: ^11.3.3
  cloud_firestore: ^5.4.4

  # UI
  cupertino_icons: ^1.0.8
  intl: ^0.19.0
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/

